<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee HR Dashboard</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        h1{
            text-align:center;
            padding:20px;
            background:#2c3e50;
            color:white;
            margin:0;
        }

        .dashboard{
            width:95%;
            max-width:1400px;
            margin:20px auto;
        }

        .tableauPlaceholder{
            width:100%;
        }
    </style>
</head>

<body>

<h1>Employee HR Dashboard</h1>

<div class="dashboard">

    <div class="tableauPlaceholder" id="tableauViz">

        <noscript>
            <a href="#">
                <img alt="Employees HR"
                    src="https://public.tableau.com/static/images/HR/HR-Board/EmployeesHR/1_rss.png"
                    style="border:none;">
            </a>
        </noscript>

        <object class="tableauViz" style="display:none;">

            <param name="host_url" value="https%3A%2F%2Fpublic.tableau.com%2F" />

            <param name="embed_code_version" value="3" />

            <param name="site_root" value="" />

            <param name="name" value="HR-Board/EmployeesHR" />

            <param name="tabs" value="no" />

            <param name="toolbar" value="yes" />

            <param name="static_image"
                value="https://public.tableau.com/static/images/HR/HR-Board/EmployeesHR/1.png" />

            <param name="animate_transition" value="yes" />

            <param name="display_static_image" value="yes" />

            <param name="display_spinner" value="yes" />

            <param name="display_overlay" value="yes" />

            <param name="display_count" value="yes" />

            <param name="language" value="fr-FR" />

        </object>

    </div>

</div>

<script>
    var divElement = document.getElementById("tableauViz");
    var vizElement = divElement.getElementsByTagName("object")[0];

    vizElement.style.display = "block";
    vizElement.style.width = "100%";
    vizElement.style.height = "850px";

    var scriptElement = document.createElement("script");
    scriptElement.src = "https://public.tableau.com/javascripts/api/viz_v1.js";
    vizElement.parentNode.insertBefore(scriptElement, vizElement);
</script>

</body>
</html>
